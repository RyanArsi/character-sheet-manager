# Config extra para testar o Laravel Reverb via ddev.
# Expõe a porta 8080 do Reverb (dentro do container) pelo router do ddev:
#   - wss://naruto-rpg.ddev.site:8443  (cliente / navegador)
#   - ws://naruto-rpg.ddev.site:8080   (http, opcional)
# E sobe o servidor Reverb como daemon junto com o ddev.
# Para desativar e voltar ao Pusher: apague este arquivo, ajuste o .env e rode `ddev restart`.
web_extra_exposed_ports:
  - name: reverb
    container_port: 8080
    http_port: 8080
    https_port: 8443

web_extra_daemons:
  - name: reverb
    command: "php artisan reverb:start --host=0.0.0.0 --port=8080"
    directory: /var/www/html
